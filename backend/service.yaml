apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: med-pass-bridge
  annotations:
    run.googleapis.com/ingress: "all"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containers:
      - image: gcr.io/delta-cortex-490805-b8/med-pass-backend
        ports:
        - containerPort: 8080
        env:
        - name: GEMINI_API_KEY
          value: ""
